<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わが子の兄弟喧嘩タイプチェック</title>
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Zen Maru Gothic', sans-serif; background: #FBF7F2; min-height: 100vh; padding-bottom: 3rem; }
.header { background: #fff; border-bottom: 0.5px solid #EDE8E0; padding: 0.75rem 1rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.badge { font-size: 10px; background: #F5EDD9; color: #9A6C2E; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.screen { display: none; }
.screen.active { display: block; }
.hero-img { width: 100%; height: auto; display: block; max-height: 380px; object-fit: contain; background: #F5F3EF; }
.hero-text { background: #fff; padding: 1.25rem 1.25rem 1rem; border-bottom: 0.5px solid #EDE8E0; }
.hero-title { font-family: 'Kiwi Maru', serif; font-size: 18px; color: #5A3E20; font-weight: 500; line-height: 1.6; margin-bottom: 0.5rem; }
.hero-sub { font-size: 12px; color: #A08060; }
.start-wrap { padding: 1.25rem 1rem 0; }
.start-btn { display: block; width: 100%; padding: 1rem; border-radius: 14px; background: #C9984A; color: #fff; font-family: 'Kiwi Maru', serif; font-size: 16px; font-weight: 500; text-align: center; border: none; cursor: pointer; }
.start-btn:hover { background: #B5823A; }
.q-img { width: 100%; height: auto; display: block; max-height: 360px; object-fit: contain; background: #F5F3EF; }
.progress-wrap { padding: 0.9rem 1rem 0; }
.progress-bar { height: 5px; background: #EDE8E0; border-radius: 5px; overflow: hidden; }
.progress-fill { height: 100%; background: #C9984A; border-radius: 5px; transition: width 0.35s ease; }
.progress-label { font-size: 11px; color: #A08060; text-align: right; margin-top: 4px; }
.card { background: #fff; margin: 1rem 1rem 0; border-radius: 20px; padding: 1.5rem 1.25rem; border: 0.5px solid #EDE8E0; }
.step-num { font-size: 11px; color: #B09070; text-align: center; margin-bottom: 0.4rem; font-weight: 500; letter-spacing: 0.05em; }
.q-title { font-family: 'Kiwi Maru', serif; font-size: 15px; color: #5A3E20; text-align: center; margin-bottom: 1.1rem; line-height: 1.65; }
.choice-btn { display: block; width: 100%; padding: 0.85rem 1rem; margin-bottom: 0.55rem; border: 1.5px solid #E8DDCC; border-radius: 14px; background: #fff; text-align: left; font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; color: #5A3E20; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.choice-btn:hover { background: #FBF4E6; border-color: #C9A97A; }
.choice-btn:last-child { margin-bottom: 0; }
.result-img { width: 100%; height: auto; display: block; max-height: 360px; object-fit: contain; background: #F5F3EF; }
.result-card { background: #fff; margin: 1rem 1rem 0; border-radius: 20px; padding: 1.5rem 1.25rem; border: 0.5px solid #EDE8E0; }
.result-type { font-size: 12px; color: #9A6C2E; font-weight: 700; background: #F5EDD9; display: inline-block; padding: 4px 14px; border-radius: 20px; margin-bottom: 0.75rem; }
.result-title { font-family: 'Kiwi Maru', serif; font-size: 18px; color: #5A3E20; margin-bottom: 1rem; line-height: 1.5; }
.result-body { font-size: 14px; color: #7A5C3A; line-height: 1.85; margin-bottom: 1.4rem; white-space: pre-wrap; }
.result-cta-label { font-size: 13px; color: #A08060; text-align: center; margin-bottom: 0.6rem; line-height: 1.8; }
.restart-btn { display: block; width: 100%; padding: 0.85rem; border-radius: 14px; background: #fff; color: #C9984A; font-family: 'Kiwi Maru', serif; font-size: 14px; font-weight: 500; text-align: center; border: 1.5px solid #C9984A; cursor: pointer; margin-top: 0.75rem; }
.restart-btn:hover { background: #FBF4E6; }
.tip-box { background: #FBF4E6; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1.4rem; border: 1px solid #E8DDCC; }
.tip-label { font-size: 13px; color: #9A6C2E; font-weight: 700; margin-bottom: 0.5rem; }
.cta-btn { display: block; width: 100%; padding: 1rem; border-radius: 14px; background: #C9984A; color: #fff; font-family: 'Kiwi Maru', serif; font-size: 15px; font-weight: 500; text-align: center; border: none; cursor: pointer; text-decoration: none; }
.cta-btn:hover { background: #B5823A; }
</style>
</head>
<body>
<div class="header">
  <img src="files/logo.png" alt="Nicotto Project" style="height:36px;width:auto;">
  <span class="badge">発達科学コミュニケーション</span>
</div>
 
<!-- 表紙 -->
<div id="screen-top" class="screen active">
  <img class="hero-img" src="files/newtop2.png" alt="わが子の兄弟喧嘩タイプチェック">
 
  <div class="start-wrap">
    <button class="start-btn" onclick="showQ(1)">診断スタート →</button>
  </div>
</div>
 
<!-- 質問1 -->
<div id="screen-1" class="screen">
  <img class="q-img" src="files/q1.png" alt="兄弟が喧嘩">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" style="width:25%"></div></div>
    <div class="progress-label">1 / 4</div>
  </div>
  <div class="card">
    <div class="step-num">質問 1 / 4</div>
    <p class="q-title">きょうだい喧嘩が一番<br>激しくなるのはいつですか？</p>
    <button class="choice-btn" onclick="ans(1,'朝');showQ(2)">🌅 朝、登園・登校前</button>
    <button class="choice-btn" onclick="ans(1,'夕方');showQ(2)">🌆 夕方〜夕食前</button>
    <button class="choice-btn" onclick="ans(1,'夜');showQ(2)">🌙 夜・寝る前</button>
    <button class="choice-btn" onclick="ans(1,'休日');showQ(2)">☀️ 休日</button>
  </div>
</div>
 
<!-- 質問2 -->
<div id="screen-2" class="screen">
  <img class="q-img" src="files/q2.png" alt="癇癪を起こす男の子">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" style="width:50%"></div></div>
    <div class="progress-label">2 / 4</div>
  </div>
  <div class="card">
    <div class="step-num">質問 2 / 4</div>
    <p class="q-title">お子さんの荒れ方は<br>どんな感じですか？</p>
    <button class="choice-btn" onclick="ans(2,'暴力');showQ(3)">👊 叩く・蹴るなど手が出る</button>
    <button class="choice-btn" onclick="ans(2,'暴言');showQ(3)">💢 暴言が出て止まらない</button>
    <button class="choice-btn" onclick="ans(2,'ちょっかい');showQ(3)">😤 しつこいちょっかい</button>
    <button class="choice-btn" onclick="ans(2,'癇癪');showQ(3)">😭 癇癪で泣き叫ぶ</button>
  </div>
</div>
 
<!-- 質問3 -->
<div id="screen-3" class="screen">
  <img class="q-img" src="files/q3.png" alt="外ではいい子・家では荒れる対比">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" style="width:75%"></div></div>
    <div class="progress-label">3 / 4</div>
  </div>
  <div class="card">
    <div class="step-num">質問 3 / 4</div>
    <p class="q-title">外での様子はどうですか？</p>
    <button class="choice-btn" onclick="ans(3,'いい子');showQ(4)">😇 外では「いい子」と言われる</button>
    <button class="choice-btn" onclick="ans(3,'トラブル');showQ(4)">😠 外でもトラブルが多い</button>
  </div>
</div>
 
<!-- 質問4 -->
<div id="screen-4" class="screen">
  <img class="q-img" src="files/q4.png" alt="疲れ果てたお母さん">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
    <div class="progress-label">4 / 4</div>
  </div>
  <div class="card">
    <div class="step-num">質問 4 / 4</div>
    <p class="q-title">いまの正直な気持ちは？</p>
    <button class="choice-btn" onclick="ans(4,'自己嫌悪');showResult()">😔 自分を責めてしまう</button>
    <button class="choice-btn" onclick="ans(4,'辛い');showResult()">😢 毎日見ていて辛い</button>
    <button class="choice-btn" onclick="ans(4,'限界');showResult()">🤯 もうどうしていいか分からない</button>
  </div>
</div>
 
<!-- 結果 -->
<div id="screen-result" class="screen">
  <img class="result-img" id="result-img" src="files/r1.png" alt="診断結果イラスト">
  <div class="result-card">
    <div><span class="result-type" id="r-type"></span></div>
    <p class="result-title" id="r-title"></p>
    <p class="result-body" id="r-body"></p>
    <div class="tip-box">
      <p class="tip-label">💡 ワンポイントアドバイス</p>
      <p class="result-body" id="r-tip"></p>
    </div>
    <p class="result-cta-label">より詳しいタイプ診断と<br>お子さん専用のサポートプランは<br>こちらからお受け取りください。</p>
    <a href="https://www.agentmail.jp/lp/r/23619/188924/?app" class="cta-btn">個別相談を申し込む →</a>
    <button onclick="restart()" class="restart-btn">もう一度診断する</button>
  </div>
</div>
 
<script>
var answers = {};
var Q1_COMMENTS = {"朝": "朝の支度を進めたいだけなのに、登園・登校前から兄弟喧嘩が始まると、一日が始まる前からどっと疲れてしまいますよね。", "夕方": "夕方、やることが山ほどある時間に兄弟喧嘩が始まると、ママの余裕も一気になくなってしまいますよね。", "夜": "やっと一日が終わると思った寝る前に兄弟喧嘩が始まると、もう早く寝てほしいと思ってしまいますよね。", "休日": "せっかくの休日なのに、朝からきょうだいの揉めごとが続くと、休むどころか一日中気を張ってしまいますよね。"};
var Q4_COMMENTS = {"自己嫌悪": "私の関わり方が悪いのかなと、自分を責めてしまうこともあるかもしれません。", "辛い": "毎日その姿を見ているだけで、ママの心も少しずつ削られていきますよね。", "限界": "止めても、叱っても、受け止めても変わらないと、もうどうしたらいいのと途方に暮れてしまいますよね。"};
var RESULTS = {"暴力_いい子": {"img": "files/r1.png", "type": "脳のエネルギーからっぽタイプ", "title": "外でのがんばりが、家で爆発しています", "body_mid": "外ではちゃんとできているのに、家に帰った瞬間、きょうだいに手が出てしまう。なんで家でだけこんなに荒れるのと、見ているママもしんどくなりますよね。叩かれる子を見るのも辛い。叩いている子の顔が別人みたいに見えるのも辛い。本当は子どものこともわかってあげたいのに、まず止めなきゃと思って声が強くなってしまうこともあるかもしれません。", "tenkan": "このタイプの子は、外でがんばりすぎて、家に帰る頃には脳のエネルギーがからっぽになっている可能性があります。叩く・蹴る行動は、意地悪ではなくもう余裕がないよのサインかもしれません。", "tip_kodo": "帰宅後15分だけ、質問・注意・指示を減らして、何もしない時間を作ってあげてください。帰ってきたね、疲れたねと短く受け止めるだけで大丈夫です。", "tip_anshin": "今の兄弟喧嘩は、性格の問題と決めつけなくて大丈夫です。わが子のタイプに合う整え方がわかると、叱って止めるだけの毎日から少しずつ抜け出せます。"}, "暴言_いい子": {"img": "files/r2.png", "type": "気持ちが迷子タイプ", "title": "言葉を飲み込みすぎて、限界を迎えています", "body_mid": "兄弟喧嘩になるたびに、強い言葉が出る。外ではそんなことを言わないのに、家では暴言が止まらなくなると、ママも不安になりますよね。本当は、そんな言葉を使ってほしくない。このままお友達にも言ってしまったらどうしようと心配になることもあるかもしれません。", "tenkan": "このタイプの子は、外で言いたいことを飲み込みすぎて、家で一気に言葉があふれている可能性があります。暴言は、性格が悪いからではなく、本当の気持ちをまだうまく言葉にできないサインかもしれません。", "tip_kodo": "暴言を言い返したり、すぐに正そうとする前に、本当は○○したかったんだね、悔しかったんだねと、気持ちを短く言葉にしてあげてください。", "tip_anshin": "暴言は、放っておくものではありません。叱る前に気持ちの言葉を増やしてあげることで、少しずつ怒鳴る以外の伝え方が育っていきます。"}, "ちょっかい_いい子": {"img": "files/r3.png", "type": "ぬくもり充電切れタイプ", "title": "「見てほしい」が喧嘩になっています", "body_mid": "わざときょうだいの邪魔をする。おもちゃを取る。しつこくちょっかいを出す。やめなさいと何度言っても繰り返されると、ママもイライラしてしまいますよね。本当は仲良く遊んでほしいだけ。かまってほしいのかなと思っても、毎回付き合う余裕がない日もありますよね。", "tenkan": "このタイプの子は、外で一人でがんばりすぎて、家に帰るとママや兄弟とつながりたくて仕方なくなっている可能性があります。ちょっかいは、困らせたいのではなく見てほしい、つながりたいのサインかもしれません。", "tip_kodo": "喧嘩が起きていない時に、短い声かけを増やしてみてください。ごはん食べてるね、手を洗ったんだね。行動をそのまま言葉にするだけで大丈夫です。", "tip_anshin": "穏やかな時間に見てもらえる経験が増えると、喧嘩でつながろうとする行動は少しずつ減っていきます。"}, "癇癪_いい子": {"img": "files/r4.png", "type": "ストレスのダム決壊タイプ", "title": "がんばりすぎた感情が、一気に溢れ出しています", "body_mid": "一度火がつくと、泣く、叫ぶ、怒るが止まらない。兄弟喧嘩のはずだったのに、気づけば大きな癇癪になっていて、ママもどうしたらいいかわからなくなりますよね。なだめてもダメ。叱ってもダメ。私の対応が悪いのかなと、終わったあとに自分を責めてしまうこともあるかもしれません。", "tenkan": "このタイプの子は、外で感情を抑えてがんばっている分、家で安心した瞬間にストレスのダムが決壊している可能性があります。癇癪は、わがままではなくもう自分では止められないという脳のSOSかもしれません。", "tip_kodo": "癇癪が起きていない時間にスキンシップを1日1回増やしてみてください。頭をなでる、背中をさする、横に座る。短い関わりで大丈夫です。", "tip_anshin": "癇癪は、起きてから止めるより、起きにくい脳の状態を作ることが大切です。普段の安心の積み重ねで、感情の爆発は少しずつ小さくしていけます。"}, "暴力_トラブル": {"img": "files/r5.png", "type": "感情のふた吹っ飛びタイプ", "title": "感情のブレーキが効きにくい状態です", "body_mid": "家だけではなく、外でも手が出ることがある。兄弟喧嘩でも叩く・蹴るが出てしまうと、このままで大丈夫なのかなと心配になりますよね。本当は、叩く前に止まれる子になってほしい。ママ自身も責められているように感じることがあるかもしれません。", "tenkan": "このタイプの子は、感情が動いた瞬間にブレーキをかける力が、まだ育ち途中の可能性があります。叩く行動は、怒りや悔しさが一気に体から出てしまっている状態かもしれません。", "tip_kodo": "寝る前に1つだけ、気持ちを言葉にする時間を作ってみてください。今日楽しかったことは？答えられなくても、ママがそっかと受け止めるだけで大丈夫です。", "tip_anshin": "手が出る行動は、叱るだけでは止まりにくいことがあります。感情を言葉にする練習を少しずつ増やすことで、叩く前に伝える力が育っていきます。"}, "暴言_トラブル": {"img": "files/r6.png", "type": "ストレス爆発タイプ", "title": "どこにいてもストレスが溢れています", "body_mid": "家でも外でも、強い言葉が出やすい。兄弟喧嘩になると暴言が止まらず、ママも傷ついてしまいますよね。本当は、やさしい言葉で話してほしい。このまま人間関係で困るんじゃないかと不安になることもあるかもしれません。", "tenkan": "このタイプの子は、ストレスがたまった時に、気持ちより先に強い言葉が出てしまう可能性があります。暴言は、うまく表現できない感情が爆発しているサインかもしれません。", "tip_kodo": "強い言葉が出てきた時に、すぐ正論で返す前に、そう感じたんだね、嫌だったんだねと、短く受け止めてみてください。そのあと落ち着いてから、別の言い方を一緒に考えれば大丈夫です。", "tip_anshin": "受け止めることは、暴言を許すことではありません。まず気持ちを落ち着かせてから伝え方を教えることで、子どもは少しずつ強い言葉以外の方法を覚えていきます。"}, "ちょっかい_トラブル": {"img": "files/r7.png", "type": "脳のアクセル全開タイプ", "title": "脳が常に刺激を求めています", "body_mid": "じっとしていられず、弟や妹にちょっかいを出す。止めてもまた始まる。なんでわざわざ喧嘩になることをするのと、ママも疲れてしまいますよね。毎回注意するのも疲れるし、下の子が泣くたびに気持ちが削られる。わざとやってるのと思ってしまう日もあるかもしれません。", "tenkan": "このタイプの子は、脳が刺激を求めやすく、退屈や待つ時間が苦手な可能性があります。ちょっかいは、もっと動きたい、もっと刺激がほしいというサインかもしれません。", "tip_kodo": "喧嘩が起こっていない時に、良い行動を見つけて声をかけてみてください。座って食べてるね、待てたね。できている瞬間を言葉にするのがポイントです。", "tip_anshin": "注意だけが増えると、子どもの脳はさらに刺激を求めて動きやすくなることがあります。できている瞬間を増やしてあげることで、落ち着いた行動が少しずつ定着していきます。"}, "癇癪_トラブル": {"img": "files/r8.png", "type": "感情ぜんぶ出しタイプ", "title": "感情のブレーキが効きにくい状態です", "body_mid": "兄弟喧嘩になると、泣く、怒る、叫ぶが一気に出る。家でも外でも感情があふれやすいと、ママも常に気が抜けませんよね。本当は、穏やかに過ごしたい。それなのに毎日感情の爆発に振り回されて、もうどうしたらいいのと途方に暮れることもあるかもしれません。", "tenkan": "このタイプの子は、感情が大きく動いた時に、自分で切り替える力がまだ育ち途中の可能性があります。癇癪で泣き叫ぶのは、どうすれば落ち着けるかわからないという脳のSOSかもしれません。", "tip_kodo": "叱るより、兄弟で仲良くしている一瞬を見つけて声をかけてみてください。一緒に遊んでるね、今、貸してあげたね。ほんの数秒の良い場面で大丈夫です。", "tip_anshin": "感情が大きい子ほど、うまくできている瞬間を見つけてもらう経験が大切です。小さな成功が増えると、感情の切り替えは少しずつ育っていきます。"}};
 
 
function restart() {
  Object.keys(answers).forEach(function(k){ delete answers[k]; });
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-top').classList.add('active');
  window.scrollTo(0, 0);
}
function ans(q, val) { answers[q] = val; }
 
function showQ(n) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-' + n).classList.add('active');
  window.scrollTo(0, 0);
}
 
function showResult() {
  var key = answers[2] + '_' + answers[3];
  var r = RESULTS[key] || RESULTS['暴力_いい子'];
  var q1c = Q1_COMMENTS[answers[1]] || '';
  var q4c = Q4_COMMENTS[answers[4]] || '';
  var fullBody = (q1c ? q1c + '
 
' : '') + r.body_mid + (q4c ? '
 
' + q4c : '') + '
 
' + r.tenkan;
  var fullTip = r.tip_kodo + '
 
' + r.tip_anshin;
  document.getElementById('result-img').src = r.img;
  document.getElementById('r-type').textContent = r.type;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-body').textContent = fullBody;
  document.getElementById('r-tip').textContent = fullTip;
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-result').classList.add('active');
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
